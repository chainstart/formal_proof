<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">Counterexample graph for WOWII Conjecture 58</title>
  <desc id="desc">The graph has a K_3,3 core with parts A and B. A clique C of size k is joined to a0 and b0, and no other core vertices.</desc>
  <defs>
    <style>
      .core { stroke: #334155; stroke-width: 2.4; fill: none; }
      .join { stroke: #0f766e; stroke-width: 2.2; fill: none; }
      .clique { stroke: #dc2626; stroke-width: 1.8; opacity: .65; fill: none; }
      .a { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2.5; }
      .b { fill: #fde68a; stroke: #92400e; stroke-width: 2.5; }
      .c { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2.5; }
      .label { font: 16px Arial, sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 14px Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .note { font: 15px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect x="1" y="1" width="978" height="468" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="490" y="34" class="label">G_k: a K_{3,3} core plus a clique C joined only to a0 and b0</text>

  <line x1="150" y1="120" x2="390" y2="120" class="core"/>
  <line x1="150" y1="120" x2="390" y2="230" class="core"/>
  <line x1="150" y1="120" x2="390" y2="340" class="core"/>
  <line x1="150" y1="230" x2="390" y2="120" class="core"/>
  <line x1="150" y1="230" x2="390" y2="230" class="core"/>
  <line x1="150" y1="230" x2="390" y2="340" class="core"/>
  <line x1="150" y1="340" x2="390" y2="120" class="core"/>
  <line x1="150" y1="340" x2="390" y2="230" class="core"/>
  <line x1="150" y1="340" x2="390" y2="340" class="core"/>

  <path d="M150,120 C330,55 500,70 690,105" class="join"/>
  <path d="M390,120 C500,95 610,95 780,145" class="join"/>

  <circle cx="150" cy="120" r="25" class="a"/>
  <circle cx="150" cy="230" r="25" class="a"/>
  <circle cx="150" cy="340" r="25" class="a"/>
  <circle cx="390" cy="120" r="25" class="b"/>
  <circle cx="390" cy="230" r="25" class="b"/>
  <circle cx="390" cy="340" r="25" class="b"/>
  <text x="150" y="120" class="label">a0</text>
  <text x="150" y="230" class="label">a1</text>
  <text x="150" y="340" class="label">a2</text>
  <text x="390" y="120" class="label">b0</text>
  <text x="390" y="230" class="label">b1</text>
  <text x="390" y="340" class="label">b2</text>
  <text x="270" y="394" class="small">K_{3,3} core A union B</text>

  <circle cx="690" cy="105" r="26" class="c"/>
  <circle cx="780" cy="145" r="26" class="c"/>
  <circle cx="820" cy="245" r="26" class="c"/>
  <circle cx="750" cy="330" r="26" class="c"/>
  <circle cx="640" cy="305" r="26" class="c"/>
  <circle cx="610" cy="190" r="26" class="c"/>

  <line x1="690" y1="105" x2="780" y2="145" class="clique"/>
  <line x1="690" y1="105" x2="820" y2="245" class="clique"/>
  <line x1="690" y1="105" x2="750" y2="330" class="clique"/>
  <line x1="690" y1="105" x2="640" y2="305" class="clique"/>
  <line x1="690" y1="105" x2="610" y2="190" class="clique"/>
  <line x1="780" y1="145" x2="820" y2="245" class="clique"/>
  <line x1="780" y1="145" x2="750" y2="330" class="clique"/>
  <line x1="780" y1="145" x2="640" y2="305" class="clique"/>
  <line x1="780" y1="145" x2="610" y2="190" class="clique"/>
  <line x1="820" y1="245" x2="750" y2="330" class="clique"/>
  <line x1="820" y1="245" x2="640" y2="305" class="clique"/>
  <line x1="820" y1="245" x2="610" y2="190" class="clique"/>
  <line x1="750" y1="330" x2="640" y2="305" class="clique"/>
  <line x1="750" y1="330" x2="610" y2="190" class="clique"/>
  <line x1="640" y1="305" x2="610" y2="190" class="clique"/>

  <text x="690" y="105" class="label">c1</text>
  <text x="780" y="145" class="label">c2</text>
  <text x="820" y="245" class="label">c3</text>
  <text x="750" y="330" class="label">...</text>
  <text x="640" y="305" class="label">ck</text>
  <text x="610" y="190" class="label">c</text>
  <text x="715" y="394" class="small">C is a clique of size k, and C union {a0,b0} is also a clique</text>

  <rect x="492" y="73" width="190" height="82" rx="6" fill="#ffffff" opacity="0.9"/>
  <text x="505" y="92" class="note">Every c in C is joined</text>
  <text x="505" y="116" class="note">to both a0 and b0,</text>
  <text x="505" y="140" class="note">and to no other core vertex.</text>
</svg>
